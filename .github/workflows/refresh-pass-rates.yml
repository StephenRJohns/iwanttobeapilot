name: Weekly Pass Rate Refresh

on:
  schedule:
    - cron: "0 9 * * 0"   # Every Sunday at 09:00 UTC (offset from sync-airmen at 07:00)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-pass-rates cron
        run: |
          response=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://iwanttobeapilot.online/api/cron/refresh-pass-rates)

          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.json

          if [ "$response" != "200" ]; then
            echo "Cron endpoint returned non-200 status: $response"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          body=$(cat /tmp/body.json 2>/dev/null || echo "No response body — site may be unreachable")
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"noreply@iwanttobeapilot.online\",
              \"to\": \"jjjjj_enterprises_llc@protonmail.com\",
              \"subject\": \"[I Want To Be A Pilot] Pass rate refresh FAILED\",
              \"html\": \"<pre style='font-family:monospace'>GitHub Actions workflow failed.\n\nResponse: $body</pre>\"
            }"
